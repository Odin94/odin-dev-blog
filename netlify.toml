[build]
command = "pnpm build"
publish = "dist"

[build.environment]
NODE_VERSION = "22"
# The existing Netlify site still has the legacy Next.js runtime enabled.
NETLIFY_NEXT_PLUGIN_SKIP = "true"

# Preserve links and search results from the previous Next.js site.
[[redirects]]
from = "/articles"
to = "/blog/"
status = 301

[[redirects]]
from = "/datenschutzerklaerung"
to = "/datenschutz/"
status = 301

# Astro fingerprints generated bundles and fonts, so browsers can reuse them indefinitely.
[[headers]]
for = "/_astro/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Public image names are stable, so keep their browser lifetime bounded for painless updates.
[[headers]]
for = "/*.jpg"

[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
for = "/*.webp"

[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
for = "/*.svg"

[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
for = "/*.ico"

[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
for = "/*"

[headers.values]
Content-Security-Policy = "default-src 'self'; base-uri 'self'; connect-src 'self' https://eu.i.posthog.com https://eu-assets.i.posthog.com; font-src 'self' data:; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: blob:; object-src 'none'; script-src 'self' 'unsafe-inline' https://eu-assets.i.posthog.com; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:; upgrade-insecure-requests"
Permissions-Policy = "camera=(), geolocation=(), microphone=()"
Referrer-Policy = "strict-origin-when-cross-origin"
Strict-Transport-Security = "max-age=31536000"
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
